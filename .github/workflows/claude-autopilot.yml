name: Claude CEO Review

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ceo-review:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]' &&
      (
        github.event_name == 'issues' ||
        contains(github.event.comment.body, '@claude-ceo')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install gstack (latest)
        run: |
          mkdir -p .claude/skills
          git clone --single-branch --depth 1 \
            https://github.com/garrytan/gstack.git \
            .claude/skills/gstack

      - name: CEO Review
        id: ceo_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SKILL_CONTENT=$(cat .claude/skills/gstack/plan-ceo-review/SKILL.md)

          # issue_comment 触发时用评论内容，issues 触发时用 issue body
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            ISSUE_BODY="${{ github.event.comment.body }}"
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          else
            ISSUE_BODY="${{ github.event.issue.body }}"
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          fi

          RESULT=$(claude -p "对这个需求执行 CEO Review：${ISSUE_BODY}" \
            --allowedTools "Read,Glob,Grep" \
            --append-system-prompt "${SKILL_CONTENT}" \
            --output-format json)

          gh issue comment $ISSUE_NUMBER \
            --body "## 🤖 CEO Review 结果

          ${RESULT}

          ---
          > 如需继续执行，请评论 \`@claude implement\`"
