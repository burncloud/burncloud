name: Claude AI Autopilot

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ceo-review:
    runs-on: ubuntu-latest
    # 打上 'ai-task' label 才触发
    if: |
      contains(github.event.label.name, 'ai-task') &&
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]'

    steps:
      # 1. Checkout 你的代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装 Claude Code CLI
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # 4. 实时 clone 最新 gstack（方式B）
      - name: Install gstack (latest)
        run: |
          mkdir -p .claude/skills
          git clone --single-branch --depth 1 \
            https://github.com/garrytan/gstack.git \
            .claude/skills/gstack

      # 5. CEO Review
      - name: CEO Review
        id: ceo_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SKILL_CONTENT=$(cat .claude/skills/gstack/plan-ceo-review/SKILL.md)
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          RESULT=$(claude -p "对这个需求执行 CEO Review：${ISSUE_BODY}" \
            --allowedTools "Read,Glob,Grep" \
            --append-system-prompt "${SKILL_CONTENT}" \
            --output-format json)

          # 把结果写入 Issue 评论
          gh issue comment $ISSUE_NUMBER \
            --body "## 🤖 CEO Review 结果

          ${RESULT}

          ---
          > 如需继续执行，请评论 \`@claude implement\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
