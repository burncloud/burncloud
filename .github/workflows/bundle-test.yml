name: Bundle Windows Test (Clean Environment)

on:
  push:
    branches: [main, install, "feature/*"]
  pull_request:
  workflow_dispatch:

env:
  RUST_LOG: debug

jobs:
  # ============================================================
  # Windows Bundle 测试（模拟全新机器环境）
  # ============================================================
  test-windows-clean:
    runs-on: windows-latest
    name: Windows Clean Install Test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build CLI
        run: cargo build --release --bin burncloud

      - name: Create Bundle
        run: ./target/release/burncloud.exe bundle create openclaw -o ./bundles

      # ============================================================
      # 关键步骤：模拟全新机器环境
      # ============================================================
      - name: 🧹 Clean Environment (Simulate Fresh Machine)
        id: clean-env
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  模拟全新机器 - 移除预装工具" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          # 获取当前 PATH
          $originalPath = $env:PATH
          Write-Host "`n原始 PATH 条目数: $(($originalPath -split ';').Count)"

          # 要移除的路径模式
          $patternsToRemove = @(
            "*\nodejs\*",
            "*\nodejs*",
            "*npm\*",
            "*\npm\*",
            "*\.npm\*",
            "*Git\*",
            "*\Git\*",
            "*git\*",
            "*\git\*",
            "*fnm\*",
            "*\fnm\*",
            "*\.fnm\*",
            "*yarn\*",
            "*pnpm\*"
          )

          # 过滤 PATH
          $cleanPath = ($originalPath -split ';' | Where-Object {
            $p = $_
            -not ($patternsToRemove | Where-Object { $p -like $_ })
          }) -join ';'

          # 设置新的 PATH
          $env:PATH = $cleanPath
          echo "PATH=$cleanPath" >> $env:GITHUB_ENV

          Write-Host "`n清理后 PATH 条目数: $(($cleanPath -split ';').Count)"

          # 验证移除结果
          Write-Host "`n=== 验证环境（应该是未安装状态）===" -ForegroundColor Yellow

          $commands = @("node", "npm", "git", "fnm")
          foreach ($cmd in $commands) {
            try {
              $result = Get-Command $cmd -ErrorAction Stop
              Write-Host "  ⚠️  $cmd 仍可用: $($result.Source)" -ForegroundColor Yellow
            } catch {
              Write-Host "  ✓  $cmd 已移除（预期）" -ForegroundColor Green
            }
          }

          Write-Host "`n✅ 环境清理完成，模拟全新 Windows 机器"

      # ============================================================
      # 在干净环境中测试 Bundle 安装
      # ============================================================
      - name: 📦 Install from Bundle (Fresh Machine)
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  开始 Bundle 安装（模拟全新机器）" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          # 再次确认环境
          Write-Host "`n预安装检查:"
          node --version 2>$null || Write-Host "  Node.js: 未安装 ✓"
          npm --version 2>$null || Write-Host "  npm: 未安装 ✓"
          git --version 2>$null || Write-Host "  Git: 未安装 ✓"

          Write-Host "`n开始安装..."
          ./target/release/burncloud.exe install openclaw --bundle ./bundles/openclaw-bundle --auto-deps
        continue-on-error: true

      - name: ✅ Post-install Verification
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  安装后验证" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          # 检查安装状态
          Write-Host "`n=== BurnCloud 安装状态 ==="
          ./target/release/burncloud.exe install openclaw --status

          # 验证 Node.js 是否已安装
          Write-Host "`n=== Node.js 版本 ==="
          node --version
          npm --version

          # 验证 fnm 是否已安装
          Write-Host "`n=== fnm 版本 ==="
          fnm --version

      - name: Upload Bundle Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: bundles/
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-failure-logs
          path: |
            *.log
            bundles/**/*.log
          retention-days: 7
