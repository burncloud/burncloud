name: Bundle Windows Test

on:
  push:
    branches: [main, install, "feature/*"]
  pull_request:
  workflow_dispatch:

env:
  RUST_LOG: debug

jobs:
  # ============================================================
  # Windows Bundle 测试（仅测试 bundle 安装功能）
  # ============================================================
  test-windows:
    runs-on: windows-latest
    name: Windows Bundle Test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 只编译 installer 相关的 CLI，不编译整个项目
      - name: Build CLI (installer only)
        run: cargo build --release --bin burncloud -p burncloud-cli

      - name: Create Bundle
        run: ./target/release/burncloud.exe bundle create openclaw -o ./bundles

      - name: Pre-install Check
        run: |
          Write-Host "=== 预安装环境检查 ===" -ForegroundColor Cyan
          git --version
          node --version 2>$null || Write-Host "Node.js: 未安装"
          npm --version 2>$null || Write-Host "npm: 未安装"

      - name: Install from Bundle
        run: |
          Write-Host "=== 开始 Bundle 安装 ===" -ForegroundColor Cyan
          ./target/release/burncloud.exe install openclaw --bundle ./bundles/openclaw-bundle --auto-deps
        continue-on-error: true

      - name: Post-install Check
        run: |
          Write-Host "=== 安装后检查 ===" -ForegroundColor Cyan
          ./target/release/burncloud.exe install openclaw --status
          Write-Host "`n=== 验证 Node.js ===" -ForegroundColor Cyan
          node --version

      - name: Upload Bundle Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: bundles/
          retention-days: 7
