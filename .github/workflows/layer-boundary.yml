name: Layer Boundary Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'crates/server/Cargo.toml'
      - '.ci/check-layer-boundaries.sh'

permissions:
  contents: read
  pull-requests: write

jobs:
  boundary-check:
    name: Server → Database boundary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run layer boundary check
        id: check
        run: |
          chmod +x .ci/check-layer-boundaries.sh
          bash .ci/check-layer-boundaries.sh

      - name: Comment on violation
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## ❌ Layer boundary violation',
                '',
                '`crates/server/Cargo.toml` has a direct dependency on a banned `burncloud-database-*` crate.',
                '',
                '**Rule:** server must access data through the service layer (`burncloud-service-*`).',
                '',
                'Allowed exceptions (schema migration only):',
                '- `burncloud-database`',
                '- `burncloud-database-router`',
                '- `burncloud-database-user`',
                '',
                'To fix: move the dep to an existing service crate, or create a new one under `crates/service/crates/`.',
              ].join('\n')
            })
