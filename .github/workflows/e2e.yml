name: E2e page

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: crates/tests/tests/e2e-playwright/package.json
      
      - name: Install dependencies
        working-directory: crates/tests/tests/e2e-playwright
        run: npm install
      
      - name: Install Playwright browsers
        working-directory: crates/tests/tests/e2e-playwright
        run: npx playwright install --with-deps ${{ matrix.browser }}
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build backend
        run: cargo build --release --bin burncloud
      
      - name: Build frontend (web)
        run: |
          cd crates/client
          dx build --release --features web || cargo build --release -p burncloud-client --features web || echo "Frontend build may require dx CLI"
      
      - name: Run E2E tests
        working-directory: crates/tests/tests/e2e-playwright
        env:
          CI: true
          E2E_BASE_URL: http://localhost:3334
        run: npx playwright test --project=${{ matrix.browser }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: crates/tests/tests/e2e-playwright/playwright-report/
          retention-days: 30
      
      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: crates/tests/tests/e2e-playwright/test-results/
          retention-days: 7

  # Summary job that runs after all browsers complete
  e2e-summary:
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - name: Check E2E test results
        run: |
          if [ "${{ needs.e2e.result }}" == "failure" ]; then
            echo "❌ E2E tests failed"
            exit 1
          else
            echo "✅ E2E tests passed"
          fi
