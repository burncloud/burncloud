[package]
publish.workspace = true
name = "burncloud-client-shared"
version = "0.1.3"
edition = "2021"
description = "Shared components and styles for BurnCloud client applications"
license = "MIT"
repository = "https://github.com/burncloud/burncloud"
authors = ["burncloud contributors"]

[features]
default = []
desktop = ["dioxus/desktop"]

[dependencies]
dioxus = { workspace = true, features = ["signals", "hooks", "html", "macro", "launch"] }
dioxus-router.workspace = true
reqwest = { workspace = true, features = ["json", "stream"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
anyhow = { workspace = true }
once_cell = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
tokio = { workspace = true }
regex = "1.10"
dirs = { workspace = true }
gloo-storage = "0.3"
burncloud-common = { workspace = true }
futures-util = { workspace = true }
[lints]
workspace = true
