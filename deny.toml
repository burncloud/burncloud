# cargo-deny configuration
# Wave 2: license allow list + baseline advisory ignore
# Wave 3: layer boundary enforced — server no longer depends on domain-specific database crates.
#         Remaining server DB deps (burncloud-database-router, burncloud-database-user)
#         are init-only exceptions for schema migration at startup.

[graph]
targets = []

[output]
feature-depth = 1

# ─── Advisories ──────────────────────────────────────────────────────────────
# Baseline: all advisories below existed when cargo-deny was initialized (Wave 1).
# New advisories added by future dependency updates will be caught automatically.
# To suppress a new advisory, add it here with a reason and the date it was reviewed.
[advisories]
ignore = [
    # ── systray@0.4 + dioxus-desktop transitive chain ─────────────────────────
    # These crates are pulled in by systray@0.4 (old GTK/libappindicator/clap v2
    # chain) and/or dioxus-desktop (gtk-rs GTK3 bindings). Neither can be upgraded
    # without replacing the tray icon implementation entirely. All reviewed 2025-04.

    # ansi_term — via clap v2 → bindgen → libappindicator → systray
    { id = "RUSTSEC-2021-0139", reason = "ansi_term via systray>libappindicator>bindgen>clap2 chain, cannot upgrade" },

    # gtk-rs GTK3 bindings — via systray (gtk 0.8) and dioxus-desktop (gtk 0.18)
    { id = "RUSTSEC-2024-0413", reason = "gtk-rs GTK3 via systray and dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2024-0416", reason = "gtk-rs GTK3 via systray and dioxus-desktop, cannot upgrade" },

    # gdk-pixbuf, gio, glib, pango, cairo — all gtk-rs GTK3 sub-crates
    { id = "RUSTSEC-2024-0375", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2025-0057", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2024-0412", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2024-0418", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2024-0411", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2024-0414", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2024-0415", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2024-0420", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2024-0419", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2025-0119", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2024-0370", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },
    { id = "RUSTSEC-2026-0097", reason = "gtk-rs GTK3 sub-crate via systray/dioxus-desktop, cannot upgrade" },

    # shlex v0.1 — via systray > libappindicator-sys > bindgen
    { id = "RUSTSEC-2024-0006", reason = "shlex@0.1 via systray transitive chain, cannot upgrade directly" },

    # paste — unmaintained, pulled in by rav1e via image/arboard (clipboard support)
    { id = "RUSTSEC-2024-0436", reason = "paste via rav1e>image>arboard chain, no safe upgrade available" },
]

# ─── Licenses ─────────────────────────────────────────────────────────────────
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0-only",
    "CDLA-Permissive-2.0",
    "NCSA",
]

# libappindicator / libappindicator-sys use the deprecated "LGPL-2.1/LGPL-3.0"
# slash syntax that cargo-deny cannot parse. Clarify the actual expression here.
# Both LGPL variants are in the allow list above.
[[licenses.clarify]]
crate = "libappindicator"
expression = "LGPL-2.1-only OR LGPL-3.0-only"
license-files = []

[[licenses.clarify]]
crate = "libappindicator-sys"
expression = "LGPL-2.1-only OR LGPL-3.0-only"
license-files = []

[licenses.private]
ignore = true

# ─── Bans ─────────────────────────────────────────────────────────────────────
# Layer boundary enforcement (Wave 3).
#
# Rule: only service crates (and cli/router where documented) may directly
# depend on domain database crates. The server layer must go through services.
#
# Mechanism: cargo-deny [[bans.deny]] with `wrappers` — a banned crate is
# allowed only when it appears as a DIRECT dependency of a listed wrapper crate.
# Any attempt to add a banned crate directly to server/Cargo.toml will fail CI.
#
# Allowed server → database exceptions (schema migration at startup):
#   burncloud-database, burncloud-database-router, burncloud-database-user
# These are NOT in the ban list below and remain freely usable.
[bans]
# "warn" would produce ~50 warnings for transitive dep version conflicts
# (windows-sys, rand, getrandom, etc.) that we cannot control. "allow" is
# appropriate for a large workspace with desktop + server + CLI in one repo.
multiple-versions = "allow"
wildcards = "allow"

# systray@0.4 pulls in a full set of old GTK crates (gtk 0.8, gdk 0.12, etc.)
# while dioxus-desktop pulls in the newer GTK 0.18 series. Both are transitive
# deps we cannot upgrade directly. Skip systray's entire dep tree to suppress
# the ~80 duplicate-version warnings these conflicts produce.
skip-tree = [
    { crate = "systray@0.4.0", reason = "old GTK dep chain conflicts with dioxus-desktop; upgrade blocked by systray API" },
]

# burncloud-database-model — model_ domain (model_capabilities metadata)
[[bans.deny]]
crate = "burncloud-database-model"
wrappers = [
    "burncloud-service-models",
    "burncloud-cli",
    "burncloud-router",
]
reason = "Model metadata must not be imported directly by server; use service layer"

# burncloud-database-billing — billing_ domain (prices, tiered prices, exchange rates)
[[bans.deny]]
crate = "burncloud-database-billing"
wrappers = [
    "burncloud-service-billing",
    "burncloud-cli",
    "burncloud-router",
]
reason = "Billing DB access must go through burncloud-service-billing"

# burncloud-database-channel — channel_ domain (providers, abilities, protocol configs)
[[bans.deny]]
crate = "burncloud-database-channel"
wrappers = [
    "burncloud-service-channel",
    "burncloud-cli",
    "burncloud-router",
]
reason = "Channel DB access must go through burncloud-service-channel"

# burncloud-database-sys — sys_ domain (settings, installations, downloads)
[[bans.deny]]
crate = "burncloud-database-sys"
wrappers = [
    "burncloud-service-setting",
    "burncloud-cli",
    "burncloud-download",
]
reason = "Sys DB access must go through service layer (or download/cli for their tables)"

# ─── Sources ──────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
