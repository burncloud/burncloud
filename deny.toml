# cargo-deny configuration
# Wave 2: license allow list + baseline advisory ignore
# Wave 3: layer boundary enforced — server no longer depends on burncloud-database-models
#         Remaining server DB deps (burncloud-database-router, burncloud-database-user)
#         are init-only exceptions for schema migration at startup.

[graph]
targets = []

[output]
feature-depth = 1

# ─── Advisories ──────────────────────────────────────────────────────────────
# Baseline: all advisories below existed when cargo-deny was initialized (Wave 1).
# New advisories added by future dependency updates will be caught automatically.
# To suppress a new advisory, add it here with a reason and the date it was reviewed.
[advisories]
ignore = [
    # redis v0.24 — upgrade blocked by API compatibility; tracked separately
    { id = "RUSTSEC-2021-0139", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0413", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0416", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0375", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2025-0057", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0412", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0418", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0411", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0414", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0415", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0420", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0419", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2025-0119", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0370", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2026-0097", reason = "redis@0.24 transitive dep, upgrade tracked" },
    # zip v0.6 — used by installer, upgrade tracked
    # shlex v0.1 — via systray > libappindicator-sys > bindgen, indirect dep
    { id = "RUSTSEC-2024-0006", reason = "shlex@0.1 via systray transitive chain, cannot upgrade directly" },
]

# ─── Licenses ─────────────────────────────────────────────────────────────────
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "Unlicense",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "CDLA-Permissive-2.0",
]

[licenses.private]
ignore = true

# ─── Bans ─────────────────────────────────────────────────────────────────────
# Layer boundary is enforced at the Cargo.toml level (server/Cargo.toml no longer
# lists burncloud-database-models or other domain DB crates). cargo-deny cannot
# enforce per-crate-pair dependency rules, so the physical Cargo.toml dep list is
# the authoritative gate. Any new direct DB dep added to server/Cargo.toml will
# require explicit review since it breaks the server → service → database layering.
[bans]
multiple-versions = "warn"
wildcards = "allow"

# ─── Sources ──────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
