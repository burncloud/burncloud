# cargo-deny configuration
# Wave 2: license allow list + baseline advisory ignore
# Wave 3: layer boundary enforced — server no longer depends on burncloud-database-models
#         Remaining server DB deps (burncloud-database-router, burncloud-database-user)
#         are init-only exceptions for schema migration at startup.

[graph]
targets = []

[output]
feature-depth = 1

# ─── Advisories ──────────────────────────────────────────────────────────────
# Baseline: all advisories below existed when cargo-deny was initialized (Wave 1).
# New advisories added by future dependency updates will be caught automatically.
# To suppress a new advisory, add it here with a reason and the date it was reviewed.
[advisories]
ignore = [
    # redis v0.24 — upgrade blocked by API compatibility; tracked separately
    { id = "RUSTSEC-2021-0139", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0413", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0416", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0375", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2025-0057", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0412", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0418", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0411", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0414", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0415", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0420", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0419", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2025-0119", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2024-0370", reason = "redis@0.24 transitive dep, upgrade tracked" },
    { id = "RUSTSEC-2026-0097", reason = "redis@0.24 transitive dep, upgrade tracked" },
    # zip v0.6 — used by installer, upgrade tracked
    # shlex v0.1 — via systray > libappindicator-sys > bindgen, indirect dep
    { id = "RUSTSEC-2024-0006", reason = "shlex@0.1 via systray transitive chain, cannot upgrade directly" },
]

# ─── Licenses ─────────────────────────────────────────────────────────────────
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "Unlicense",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "CDLA-Permissive-2.0",
]

[licenses.private]
ignore = true

# ─── Bans ─────────────────────────────────────────────────────────────────────
# Layer boundary enforcement (Wave 3).
#
# Rule: only service crates (and cli/router where documented) may directly
# depend on domain database crates. The server layer must go through services.
#
# Mechanism: cargo-deny [[bans.deny]] with `wrappers` — a banned crate is
# allowed only when it appears as a DIRECT dependency of a listed wrapper crate.
# Any attempt to add a banned crate directly to server/Cargo.toml will fail CI.
#
# Allowed server → database exceptions (schema migration at startup):
#   burncloud-database, burncloud-database-router, burncloud-database-user
# These are NOT in the ban list below and remain freely usable.
[bans]
multiple-versions = "warn"
wildcards = "allow"

# burncloud-database-models — domain model types (channels, upstreams, etc.)
# Legitimate direct users: service-billing, service-channel, service-models,
#                          cli (admin commands), router (request routing)
[[bans.deny]]
crate = "burncloud-database-models"
wrappers = [
    "burncloud-service-billing",
    "burncloud-service-channel",
    "burncloud-service-models",
    "burncloud-cli",
    "burncloud-router",
]
reason = "Domain models must not be imported directly by server; use service layer"

# burncloud-database-group — group + group-member tables
# burncloud-database-router aggregates domain DB crates; it is an allowed
# server dep for schema migration, so it must also be listed as a wrapper.
[[bans.deny]]
crate = "burncloud-database-group"
wrappers = [
    "burncloud-service-group",
    "burncloud-database-router",
]
reason = "Group DB access must go through burncloud-service-group"

# burncloud-database-token — API token table
[[bans.deny]]
crate = "burncloud-database-token"
wrappers = [
    "burncloud-service-token",
    "burncloud-database-router",
]
reason = "Token DB access must go through burncloud-service-token"

# burncloud-database-upstream — upstream channel table
[[bans.deny]]
crate = "burncloud-database-upstream"
wrappers = [
    "burncloud-service-upstream",
    "burncloud-database-router",
]
reason = "Upstream DB access must go through burncloud-service-upstream"

# burncloud-database-router-log — request log table
[[bans.deny]]
crate = "burncloud-database-router-log"
wrappers = [
    "burncloud-service-router-log",
    "burncloud-database-router",
]
reason = "Log DB access must go through burncloud-service-router-log"

# burncloud-database-setting — system settings table
[[bans.deny]]
crate = "burncloud-database-setting"
wrappers = [
    "burncloud-service-setting",
]
reason = "Settings DB access must go through burncloud-service-setting"

# burncloud-database-download — download task table
[[bans.deny]]
crate = "burncloud-database-download"
wrappers = [
    "burncloud-download",
]
reason = "Download DB access must go through burncloud-download"

# burncloud-database-installer — installer state table
[[bans.deny]]
crate = "burncloud-database-installer"
wrappers = [
    "burncloud-cli",
]
reason = "Installer DB access must go through burncloud-cli installer commands"

# ─── Sources ──────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
